  <title>Регистрация на мероприятие</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;color:#111}

<body>
  <div class="card">
    <div class="event-header">
      <h1 id="title">Мероприятие</h1>
      <div id="info" class="event-meta"></div>
      <div id="venue-info" class="event-meta" style="display:none"></div>
      <div id="error" class="error" style="display:none"></div>
      <div id="event-status" class="status-panel" aria-live="polite">
        <div id="event-status-icon" class="status-panel__icon">!</div>
        <h2 id="event-status-title" class="status-panel__title"></h2>
        <p id="event-status-text" class="status-panel__text"></p>
      </div>
    </div>
    <div id="closing-notice" style="display:none;background:#e8f5e9;padding:12px;border-radius:6px;margin-top:12px;text-align:center;font-weight:bold;color:#2e7d32;font-size:16px"></div>
    <div id="post-submit-actions" class="post-submit-actions" aria-live="polite">
      <button type="button" id="btn-close-window" class="post-submit-btn post-submit-btn--primary">Закрыть окно</button>
      <p class="post-submit-note">Если вкладка не закрылась, закройте ее вручную.</p>
    </div>
    <div id="debug-log" style="display:none;background:#f5f5f5;padding:12px;border-radius:6px;margin-top:12px;font-size:12px;max-height:200px;overflow-y:auto;border:1px solid #ddd;font-family:monospace"></div>
    <!-- Hidden form fields to pass parameters to Bitrix -->
    <input type="hidden" id="hidden_evnumber" name="EVNUMBER" value="">
    <input type="hidden" id="hidden_event_name" name="EVENT_NAME" value="">
    <input type="hidden" id="hidden_event_date" name="EVENT_DATE" value="">
    <input type="hidden" id="hidden_event_city" name="EVENT_CITY" value="">
    <div id="b24form_container"></div>
    <div class="hint">Если форма не загружается — свяжитесь с организатором.</div>
  </div>

  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const idStr = params.get('EVNUMBER');
      const id = idStr ? parseInt(idStr, 10) : null;
      const FALLBACK_FORM_ID = 739;
      const DEFAULT_FORM_CODE = '0zko7k';
      const formIdStr = params.get('CRMFNUMBER');
      const formCodeStr = params.get('CRMFHASH') || params.get('CRMFCODE');
      const hasExplicitFormCode = Boolean(formCodeStr && /^[a-zA-Z0-9]+$/.test(formCodeStr));
      const parsedFormId = formIdStr ? parseInt(formIdStr, 10) : NaN;
      const requestedFormId = Number.isInteger(parsedFormId) && parsedFormId > 0 ? parsedFormId : null;
      let runtimeDefaultFormId = FALLBACK_FORM_ID;
      let runtimeDefaultFormCode = window.B24_FORM_CODE || DEFAULT_FORM_CODE;
      const idAsNumber = id;
      const titleEl = document.getElementById('title');
      const infoEl = document.getElementById('info');
      const venueInfoEl = document.getElementById('venue-info');
      const errorEl = document.getElementById('error');
      const formContainerEl = document.getElementById('b24form_container');
      const hintEl = document.querySelector('.hint');
      const statusPanelEl = document.getElementById('event-status');
      const statusIconEl = document.getElementById('event-status-icon');
      const statusTitleEl = document.getElementById('event-status-title');
      const statusTextEl = document.getElementById('event-status-text');
      const postSubmitActionsEl = document.getElementById('post-submit-actions');
      const closeWindowBtn = document.getElementById('btn-close-window');
      let eventName = '';
      let eventDate = '';
      let eventCity = '';
      let eventVenue = '';
      let closingStarted = false;
      let submitIntentAt = 0;
      const SUBMIT_INTENT_WINDOW_MS = 120000;
      
      // Global logging function
      window.debugLog = (msg) => {
        console.log(msg);
        const log = document.getElementById('debug-log');
        if (log) {
          const time = new Date().toLocaleTimeString();
          log.innerHTML += `[${time}] ${msg}<br>`;
          log.scrollTop = log.scrollHeight;
        }
      };
      
      window.showClosingCountdown = () => {
        if (closingStarted) {
          window.debugLog('⚠️ Already closing');
          return;
        }
        closingStarted = true;
        
        const closingNotice = document.getElementById('closing-notice');
        postSubmitActionsEl.style.display = 'block';
        window.debugLog('✅ showClosingCountdown called!');
        
        let seconds = 3;
        const updateNotice = () => {
          closingNotice.textContent = `Окно закроется через ${seconds} сек...`;
          closingNotice.style.display = 'block';
          window.debugLog(`⏱️ ${seconds}s left`);
          
          if (seconds === 0) {
            closingNotice.textContent = '👋 Закрытие...';
            window.debugLog('👋 Calling window.close()');
            attemptCloseWindow();
          } else {
            seconds--;
            setTimeout(updateNotice, 1000);
          }
        };
        
        updateNotice();
      };
      
      window.debugLog('🌍 Page initialized, EVNUMBER=' + idStr);
      if (formIdStr && !requestedFormId) {
        window.debugLog('⚠️ Invalid CRMFNUMBER, fallback to default form: ' + formIdStr);
      }
      window.debugLog('🧩 Requested CRM form id: ' + (requestedFormId || 'default'));
      if (formCodeStr) {
        window.debugLog('🔐 Form code from URL detected');
      }

      if (!id || isNaN(id)) {
        errorEl.textContent = 'Неверно или не указан параметр для мероприятия';
        errorEl.style.display = 'block';
        titleEl.textContent = 'Регистрация на мероприятие';
        window.debugLog('❌ Invalid EVNUMBER: ' + idStr);
        return;
      }

      titleEl.textContent = `Мероприятие №${id}`;

      const API_BASE = window.EVENT_API_BASE || '/api/event';
      const apiUrl = `${API_BASE}/${encodeURIComponent(id)}`;
      let shouldLoadForm = false;

      function showFormBlockedMessage(kind, title, text) {
        titleEl.textContent = 'Регистрация на мероприятие';
        infoEl.textContent = '';
        venueInfoEl.style.display = 'none';
        venueInfoEl.textContent = '';
        errorEl.style.display = 'none';
        statusPanelEl.className = `status-panel status-panel--${kind}`;
        statusTitleEl.textContent = title;
        statusTextEl.textContent = text;
        statusIconEl.textContent = kind === 'closed' ? '!' : kind === 'error' ? '?' : 'x';
        statusPanelEl.style.display = 'block';
        formContainerEl.style.display = 'none';
        postSubmitActionsEl.style.display = 'none';
        if (hintEl) hintEl.style.display = 'none';
      }

      function attemptCloseWindow() {
        try {
          window.close();
        } catch (e) {
          window.debugLog('⚠️ window.close() failed: ' + (e && e.message ? e.message : e));
        }

        // Some browsers block close for tabs not opened by script.
        setTimeout(() => {
          if (!window.closed) {
            window.debugLog('ℹ️ Close blocked by browser, switching to blank page');
            try {
              window.location.replace('about:blank');
            } catch (e) {
              window.debugLog('⚠️ about:blank fallback failed');
            }
            setTimeout(() => {
              try { window.close(); } catch (e) {}
            }, 150);
          }
        }, 150);
      }

      closeWindowBtn.addEventListener('click', () => {
        window.debugLog('🖱️ Manual close button clicked');
        attemptCloseWindow();
      });

      fetch(apiUrl, {credentials:'same-origin'})
        .then(async (resp) => {
          const data = await resp.json().catch(() => ({}));
          return { ok: resp.ok, status: resp.status, data };
        })
        .then(({ ok, status, data }) => {
          if (!ok) {
            if (status === 404 || data.message === 'Мероприятие не найдено') {
              showFormBlockedMessage('not-found', 'Мероприятие не найдено', 'Проверьте ссылку или обратитесь к организатору.');
              window.debugLog('⛔ Event not found for EVNUMBER=' + id);
              return;
            }
            throw new Error('API response ' + status);
          }

          if (data && data.found === false) {
            showFormBlockedMessage('not-found', 'Мероприятие не найдено', 'Проверьте ссылку или обратитесь к организатору.');
            window.debugLog('⛔ Event not found by payload for EVNUMBER=' + id);
            return;
          }

          if (data && data.registrationOpen === false) {
            showFormBlockedMessage('closed', 'Регистрация сейчас закрыта', 'Регистрация на это мероприятие временно недоступна.');
            window.debugLog('⛔ Registration is closed for EVNUMBER=' + id + ', stateId=' + data.stateId);
            return;
          }

          eventName = data.name || data.title || '';
          eventDate = data.date || data.event_date || '';
          eventCity = data.city || data.location || '';
          eventVenue = data.venue || '';
          if (eventName && eventCity) {
            titleEl.textContent = `${eventName} (${eventCity})`;
          } else if (eventName) {
            titleEl.textContent = eventName;
          }
          const parts = [];
          if (eventDate) parts.push(`Дата: ${formatDate(eventDate)}`);
          infoEl.textContent = parts.join(' • ');
          if (eventVenue) {
            venueInfoEl.innerHTML = `Место: ${escapeHtml(eventVenue)}`;
            venueInfoEl.style.display = 'block';
          } else {
            venueInfoEl.style.display = 'none';
            venueInfoEl.textContent = '';
          }
          shouldLoadForm = true;
          window.debugLog('✅ Event data loaded');
        })
        .catch(err => {
          window.debugLog('⚠️ Event API error: ' + err.message);
          showFormBlockedMessage('error', 'Не удалось загрузить данные мероприятия', 'Попробуйте обновить страницу позже.');
        })
        .finally(() => {
          if (!shouldLoadForm) {
            return;
          }
          window.debugLog('Loading Bitrix form...');
          document.getElementById('hidden_evnumber').value = id;
          document.getElementById('hidden_event_name').value = eventName || `Мероприятие №${id}`;
          document.getElementById('hidden_event_date').value = eventDate || '';
          document.getElementById('hidden_event_city').value = eventCity || '';
          loadB24();
        });

      function formatDate(d){
        try{const dt=new Date(d); if (isNaN(dt)) return d; return dt.toLocaleString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});}catch(e){return d}
      }

      function escapeHtml(s){
        const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
        return String(s).replace(/[&<>"']/g, c => map[c]);
      }

      function markSubmitIntent(reason){
        submitIntentAt = Date.now();
        postSubmitActionsEl.style.display = 'block';
        window.debugLog('🧭 Submit intent detected: ' + reason);
      }

      function hasRecentSubmitIntent(){
        return submitIntentAt > 0 && (Date.now() - submitIntentAt) <= SUBMIT_INTENT_WINDOW_MS;
      }

      function isBitrixUrl(url){
        return typeof url === 'string' && url.includes('bitrix24.ru');
      }

      function looksLikeRealFormPayload(body){
        const isInterestingKey = (key) => {
          const k = String(key || '').toLowerCase();
          if (!k) return false;
          if (k === 'evnumber' || k === 'event_name' || k === 'event_date' || k === 'event_city') {
            return false;
          }
          return /(name|lastname|surname|phone|email|contact|consent|message|comment|company|form|crm)/i.test(k);
        };

        if (!body) return false;

        if (body instanceof FormData) {
          let hasInteresting = false;
          let count = 0;
          for (const [key] of body.entries()) {
            count++;
            if (isInterestingKey(key)) {
              hasInteresting = true;
              break;
            }
          }
          return hasInteresting || count >= 5;
        }

        if (body instanceof URLSearchParams) {
          let hasInteresting = false;
          let count = 0;
          for (const key of body.keys()) {
            count++;
            if (isInterestingKey(key)) {
              hasInteresting = true;
              break;
            }
          }
          return hasInteresting || count >= 5;
        }

        if (typeof body === 'string') {
          return /(name|lastname|phone|email|contact|consent|company|comment)/i.test(body);
        }

        return false;
      }

      function shouldCloseAfterRequest(url, method, body){
        if (!isBitrixUrl(url)) return false;
        if (String(method || 'GET').toUpperCase() !== 'POST') return false;
        if (hasRecentSubmitIntent()) return true;
        return looksLikeRealFormPayload(body);
      }

      // Track if this is final form submission
      // (already declared at top of function)

      // Intercept fetch requests to add our parameters
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0];
        const options = args[1] || {};
        const method = String(options.method || 'GET').toUpperCase();
        const requestUrl = typeof url === 'string' ? url : (url && url.url ? url.url : '');
        const shouldCloseForThisRequest = shouldCloseAfterRequest(requestUrl, method, options.body);
        
        // Log all POST requests for debugging
        if (typeof requestUrl === 'string' && method === 'POST') {
          window.debugLog('📤 POST to: ' + requestUrl.substring(0, 60));
        }
        
        // If this looks like a Bitrix form submission (POST to bitrix24.ru)
        if (isBitrixUrl(requestUrl) && method === 'POST') {
          window.debugLog('🎯 Bitrix POST detected');
          
          // Try adding params to URL as query params
          let modifiedUrl = url;
          if (!modifiedUrl.includes('EVNUMBER')) {
            const separator = modifiedUrl.includes('?') ? '&' : '?';
            modifiedUrl = modifiedUrl + separator + 'EVNUMBER=' + id;
            args[0] = modifiedUrl;
            window.debugLog('🔗 Added EVNUMBER to URL');
          }
          
          // Try to add parameters to the request body
          if (options.body && options.body instanceof FormData) {
            options.body.append('EVNUMBER', String(id));
            options.body.append('EVENT_NAME', eventName || `Мероприятие №${id}`);
            options.body.append('EVENT_DATE', eventDate || '');
            options.body.append('EVENT_CITY', eventCity || '');
            window.debugLog('✅ Added params to FormData');
          }
        }
        
        // Chain the fetch to detect successful completion
        const fetchPromise = originalFetch.apply(this, args);
        
        // Monitor all responses for debugging
        if (isBitrixUrl(requestUrl) && method === 'POST') {
          fetchPromise
            .then(response => {
              window.debugLog(`✅ Bitrix response: ${response.status}`);
              if (response.status >= 200 && response.status < 400 && shouldCloseForThisRequest) {
                window.debugLog('💚 Triggering close sequence');
                window.showClosingCountdown();
              } else {
                window.debugLog('ℹ️ Close sequence skipped (not a final form submit)');
              }
              return response;
            })
            .catch(err => {
              window.debugLog('❌ Fetch error: ' + err.message);
            });
        }
        
        return fetchPromise;
      };

      // Also intercept XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        this._url = url;
        this._method = String(method || 'GET').toUpperCase();
        if (this._method === 'POST') {
          window.debugLog('📤 XHR POST to: ' + url.substring(0, 60));
        }
        return originalOpen.apply(this, [this._method, url, ...rest]);
      };

      const originalSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function(body) {
        const shouldCloseForThisRequest = shouldCloseAfterRequest(this._url, this._method, body);
        if (isBitrixUrl(this._url) && this._method === 'POST' && body) {
          window.debugLog('🎯 Bitrix XHR detected');
          try {
            if (body instanceof FormData) {
              body.append('EVNUMBER', id);
              body.append('EVENT_NAME', eventName || `Мероприятие №${id}`);
              body.append('EVENT_DATE', eventDate || '');
              body.append('EVENT_CITY', eventCity || '');
              window.debugLog('✅ Added params to XHR FormData');
            }
          } catch (e) {
            window.debugLog('❌ XHR error: ' + e.message);
          }

          // Listen for XHR completion
          const originalOnReadyStateChange = this.onreadystatechange;
          this.onreadystatechange = function() {
            if (this.readyState === 4) {
              window.debugLog(`✅ XHR completed: ${this.status}`);
              if (this.status >= 200 && this.status < 400 && shouldCloseForThisRequest) {
                window.debugLog('💚 Triggering close sequence from XHR');
                window.showClosingCountdown();
              } else {
                window.debugLog('ℹ️ Close sequence skipped for XHR (not a final form submit)');
              }
            }
            if (originalOnReadyStateChange) {
              originalOnReadyStateChange.apply(this, arguments);
            }
          };
        }
        return originalSend.apply(this, [body]);
      };

      async function resolveFormConfig(loaderBase) {
        try {
          const defaultMetaUrl = loaderBase + '?meta=1&ts=' + Date.now();
          const defaultResp = await fetch(defaultMetaUrl, { credentials: 'same-origin' });
          if (defaultResp.ok) {
            const defaultMeta = await defaultResp.json();
            const defaultId = Number(defaultMeta && (defaultMeta.defaultFormId || defaultMeta.resolvedFormId));
            const defaultSec = defaultMeta && defaultMeta.sec;
            if (Number.isInteger(defaultId) && defaultId > 0) {
              runtimeDefaultFormId = defaultId;
            }
            if (/^[a-zA-Z0-9]+$/.test(String(defaultSec || ''))) {
              runtimeDefaultFormCode = defaultSec;
            }
            window.debugLog('⚙️ Runtime default CRM form: ' + runtimeDefaultFormId);
          }
        } catch (e) {
          window.debugLog('⚠️ Failed to resolve runtime default form, using fallback 739');
        }

        const targetFormId = requestedFormId || runtimeDefaultFormId;
        const targetFormCode = hasExplicitFormCode ? formCodeStr : runtimeDefaultFormCode;

        if (hasExplicitFormCode || targetFormId === runtimeDefaultFormId) {
          return { formId: targetFormId, formCode: targetFormCode };
        }

        try {
          const metaUrl = loaderBase + '?meta=1&ts=' + Date.now() + '&formId=' + encodeURIComponent(targetFormId);
          const resp = await fetch(metaUrl, { credentials: 'same-origin' });
          if (!resp.ok) throw new Error('meta response ' + resp.status);
          const meta = await resp.json();
          const resolvedId = Number(meta && meta.resolvedFormId);
          const resolvedCode = meta && meta.sec;
          if (Number.isInteger(resolvedId) && resolvedId > 0 && /^[a-zA-Z0-9]+$/.test(String(resolvedCode || ''))) {
            window.debugLog('✅ Resolved form config from loader meta: id=' + resolvedId);
            return { formId: resolvedId, formCode: resolvedCode };
          }
        } catch (e) {
          window.debugLog('⚠️ Failed to resolve form meta for CRMFNUMBER=' + targetFormId + ': ' + (e && e.message ? e.message : e));
        }

        return { formId: targetFormId, formCode: targetFormCode };
      }

      async function loadB24(){
        window.debugLog('🚀 loadB24 started');
        const loaderBase = window.B24_LOADER_URL || '/api/loader';
        const container = document.getElementById('b24form_container');
        let fallbackUsed = false;
        let initWatchTimer = null;
        let formInitialized = false;
        const resolvedConfig = await resolveFormConfig(loaderBase);

        try {
          container.textContent = '';
        } catch (e) {
          try { container.innerHTML = ''; } catch (e) {}
        }
        
        window.B24_FORM_PARAMS = {
          EVNUMBER: id,
          EVENT_NAME: eventName || `Мероприятие №${id}`,
          EVENT_DATE: eventDate || '',
          EVENT_CITY: eventCity || ''
        };

        function attachLoader(formId, formCode) {
          const script = document.createElement('script');
          script.async = true;
          script.setAttribute('data-b24-form', `inline/${formId}/${formCode}`);
          script.setAttribute('data-skip-moving', 'true');
          script.setAttribute('data-EVNUMBER', id);
          script.src = loaderBase + '?ts=' + Date.now() + '&formId=' + encodeURIComponent(formId);

          script.onerror = function() {
            if (fallbackUsed || formId === runtimeDefaultFormId) {
              window.debugLog('❌ Bitrix loader failed to load');
              return;
            }

            fallbackUsed = true;
            window.debugLog('⚠️ Loader for CRMFNUMBER=' + formId + ' failed, fallback to default form ' + runtimeDefaultFormId);
            attachLoader(runtimeDefaultFormId, runtimeDefaultFormCode);
          };

          container.appendChild(script);
          window.debugLog('📥 Bitrix loader appended for form ' + formId);

          if (initWatchTimer) {
            clearTimeout(initWatchTimer);
          }

          initWatchTimer = setTimeout(() => {
            if (formInitialized) return;
            if (fallbackUsed || formId === runtimeDefaultFormId) {
              window.debugLog('❌ Form did not initialize');
              return;
            }

            fallbackUsed = true;
            window.debugLog('⚠️ Form init timeout for CRMFNUMBER=' + formId + ', fallback to default form ' + runtimeDefaultFormId);
            try {
              container.textContent = '';
            } catch (e) {
              try { container.innerHTML = ''; } catch (e) {}
            }
            attachLoader(runtimeDefaultFormId, runtimeDefaultFormCode);
          }, 5000);
        }

        attachLoader(resolvedConfig.formId, resolvedConfig.formCode);

        // Monitor form submission after it appears
        setTimeout(() => {
          const formEl = document.querySelector('form');
          if (formEl) {
            window.debugLog('📝 Form found');
            formEl.addEventListener('submit', (e) => {
              markSubmitIntent('native form submit');
              window.debugLog('🔴 Form submitted');
            }, true);
          }
        }, 500);

        // Fallback for browsers where form submit event is not reliable.
        container.addEventListener('click', (e) => {
          const target = e.target;
          if (!target || !target.closest) return;
          const submitControl = target.closest('button[type="submit"], input[type="submit"], .b24-form-btn');
          if (submitControl) {
            markSubmitIntent('submit control click');
          }
        }, true);

        // Also listen for form init to pass params via setProperty
        window.addEventListener('b24:form:init', function(ev){
          formInitialized = true;
          if (initWatchTimer) {
            clearTimeout(initWatchTimer);
            initWatchTimer = null;
          }
          try{
            const form = ev?.detail?.object;
            if (form && typeof form.setProperty === 'function') {
              window.debugLog('🔧 Setting form properties');
              form.setProperty('EVNUMBER', id);
              form.setProperty('EVENT_NAME', eventName || `Мероприятие №${id}`);
              form.setProperty('EVENT_DATE', eventDate || '');
              form.setProperty('EVENT_CITY', eventCity || '');
              window.debugLog('✅ Form properties set');
            }
          }catch(e){window.debugLog('❌ b24:form:init error: ' + e.message);}
        });
      }
    })();
  </script>
</body>
</html>
