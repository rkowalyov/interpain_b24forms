<!doctype html>
<!-- Build timestamp: 2026-07-17T21:30:00Z -->
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Регистрация на мероприятие</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;color:#111}
    body{margin:0;background:#f7f7f8;padding:24px;display:flex;align-items:flex-start;justify-content:center}
    .card{max-width:720px;width:100%;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(16,24,40,.08);padding:24px}
    h1{font-size:20px;margin:0 0 12px}
    .meta{color:#444;margin:6px 0}
    .error{color:#b00020;background:#fff0f1;padding:12px;border-radius:6px}
    .hint{color:#666;font-size:14px;margin-top:8px}
    #b24form_container{margin-top:18px}
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Регистрация на мероприятие</h1>
    <div id="info" class="meta"></div>
    <div id="error" class="error" style="display:none"></div>
    <!-- Hidden form fields to pass parameters to Bitrix -->
    <input type="hidden" id="hidden_evnumber" name="EVNUMBER" value="">
    <input type="hidden" id="hidden_event_name" name="EVENT_NAME" value="">
    <input type="hidden" id="hidden_event_date" name="EVENT_DATE" value="">
    <input type="hidden" id="hidden_event_city" name="EVENT_CITY" value="">
    <div id="b24form_container"></div>
    <div class="hint">Если форма не загружается — свяжитесь с организатором.</div>
  </div>

  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const idStr = params.get('EVNUMBER');
      // Parse as integer - Bitrix integer fields require numeric value
      const id = idStr ? parseInt(idStr, 10) : null;
      const idAsNumber = id; // Keep numeric version for Bitrix number fields
      const titleEl = document.getElementById('title');
      const infoEl = document.getElementById('info');
      const errorEl = document.getElementById('error');
      let eventName = '';
      let eventDate = '';
      let eventCity = '';

      if (!id || isNaN(id)) {
        errorEl.textContent = 'Ошибка: параметр EVNUMBER не указан в URL или не является числом.';
        errorEl.style.display = 'block';
        titleEl.textContent = 'Регистрация на мероприятие';
        console.error('❌ Invalid EVNUMBER:', idStr, '(parsed as:', id, ')');
        return;
      }
      
      console.log('ℹ️ EVNUMBER received:', idStr, '(parsed as number:', idAsNumber, ')');

      titleEl.textContent = `Регистрация на мероприятие №${id}`;

      const API_BASE = window.EVENT_API_BASE || '/api/event';
      const apiUrl = `${API_BASE}/${encodeURIComponent(id)}`;

      fetch(apiUrl, {credentials:'same-origin'})
        .then(resp => {
          if (!resp.ok) throw new Error('API response ' + resp.status);
          return resp.json();
        })
        .then(data => {
          eventName = data.name || data.title || '';
          eventDate = data.date || data.event_date || '';
          eventCity = data.city || data.location || '';
          if (eventName) titleEl.textContent = `Регистрация: ${eventName}`;
          const parts = [];
          if (eventDate) parts.push(`Дата: ${formatDate(eventDate)}`);
          if (eventCity) parts.push(`Город: ${escapeHtml(eventCity)}`);
          infoEl.textContent = parts.join(' • ');
        })
        .catch(err => {
          console.warn('Event API unavailable:', err);
        })
        .finally(() => {
          console.log('Event fetch finished, loading Bitrix form...');
          // Populate hidden form fields with parameters
          document.getElementById('hidden_evnumber').value = id;
          document.getElementById('hidden_event_name').value = eventName || `Мероприятие №${id}`;
          document.getElementById('hidden_event_date').value = eventDate || '';
          document.getElementById('hidden_event_city').value = eventCity || '';
          console.log('Hidden fields populated:', {
            EVNUMBER: id,
            EVENT_NAME: eventName,
            EVENT_DATE: eventDate,
            EVENT_CITY: eventCity
          });
          loadB24();
        });

      function formatDate(d){
        try{const dt=new Date(d); if (isNaN(dt)) return d; return dt.toLocaleString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});}catch(e){return d}
      }

      function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c]))}

      // Intercept fetch requests to add our parameters
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0];
        const options = args[1] || {};
        
        // Log all POST requests for debugging
        if (typeof url === 'string' && options.method === 'POST') {
          console.log('📤 POST Request to:', url.substring(0, 100));
        }
        
        // If this looks like a Bitrix form submission (POST to bitrix24.ru)
        if (typeof url === 'string' && url.includes('bitrix24.ru') && options.method === 'POST') {
          console.log('🎯 Intercepted Bitrix fetch POST:', url);
          
          // Try adding params to URL as query params - try multiple formats for number fields
          let modifiedUrl = url;
          if (!modifiedUrl.includes('EVNUMBER')) {
            const separator = modifiedUrl.includes('?') ? '&' : '?';
            // Add as plain number (for Bitrix integer fields)
            modifiedUrl = modifiedUrl + separator + 'EVNUMBER=' + id;
            console.log('🔗 Added EVNUMBER to URL as number:', id, '(direct value, no encoding)');
            args[0] = modifiedUrl;
          }
          
          // Try to add parameters to the request body
          if (options.body) {
            try {
              if (typeof options.body === 'string' && options.body.includes('FormData')) {
                console.log('📝 FormData in body (string type)');
              } else if (options.body instanceof FormData) {
                console.log('📋 Before append - FormData entries:');
                for (let [key, value] of options.body.entries()) {
                  console.log(`  ${key}: ${String(value).substring(0, 50)}`);
                }
                // For Bitrix integer fields - try to append as is (number, not string)
                options.body.append('EVNUMBER', String(id)); // Bitrix may expect string representation
                options.body.append('EVENT_NAME', eventName || `Мероприятие №${id}`);
                options.body.append('EVENT_DATE', eventDate || '');
                options.body.append('EVENT_CITY', eventCity || '');
                console.log('✅ Added params to FormData (EVNUMBER as string:', String(id), ', type: ' + typeof String(id) + ')');
                console.log('📋 After append - FormData entries:');
                for (let [key, value] of options.body.entries()) {
                  console.log(`  ${key}: ${String(value).substring(0, 50)}`);
                }
              } else if (typeof options.body === 'string') {
                console.log('📝 String body before:', options.body.substring(0, 200));
                options.body = options.body + 
                  '&EVNUMBER=' + encodeURIComponent(id) +
                  '&EVENT_NAME=' + encodeURIComponent(eventName || `Мероприятие №${id}`) +
                  '&EVENT_DATE=' + encodeURIComponent(eventDate || '') +
                  '&EVENT_CITY=' + encodeURIComponent(eventCity || '');
                console.log('✅ Added params to body');
                console.log('📝 String body after:', options.body.substring(0, 300));
              }
            } catch (e) {
              console.error('❌ Error adding params:', e);
            }
          } else {
            console.log('⚠️ No body in request');
          }
        }
        
        return originalFetch.apply(this, args);
      };

      // Also intercept XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        this._url = url;
        this._method = method;
        if (method === 'POST') {
          console.log('📤 XHR POST to:', url.substring(0, 100));
        }
        return originalOpen.apply(this, [method, url, ...rest]);
      };

      const originalSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function(body) {
        if (this._url && this._url.includes('bitrix24.ru') && this._method === 'POST' && body) {
          console.log('🎯 Intercepted Bitrix XHR POST:', this._url);
          try {
            if (body instanceof FormData) {
              console.log('📋 XHR FormData before:');
              for (let [key, value] of body.entries()) {
                console.log(`  ${key}: ${String(value).substring(0, 50)}`);
              }
              body.append('EVPASSPORT_ID', id);
              body.append('EVENT_NAME', eventName || `Мероприятие №${id}`);
              body.append('EVENT_DATE', eventDate || '');
              body.append('EVENT_CITY', eventCity || '');
              console.log('✅ Added params to FormData (EVPASSPORT_ID as:', typeof id, String(id), ')');
            } else {
              console.log('📝 XHR body type:', typeof body, 'length:', body.length);
            }
          } catch (e) {
            console.error('❌ Error in XHR send:', e);
          }
        }
        return originalSend.apply(this, [body]);
      };

      function loadB24(){
        console.log('🚀 loadB24 invoked');
        // Use provided loader URL (from Bitrix24 embed) or proxy through our serverless endpoint
        // Proxy avoids client-side blockers that target common CDNs.
        const loaderBase = window.B24_LOADER_URL || '/api/loader';
        const container = document.getElementById('b24form_container');

        // Always clear the container and insert a fresh script element.
        // This avoids rendering any escaped loader text and guarantees the loader is executed.
        try {
          container.textContent = '';
        } catch (e) {
          try { container.innerHTML = ''; } catch (e) {}
        }

        // Move hidden fields into the container so they're together
        const hiddenFields = [
          document.getElementById('hidden_evnumber'),
          document.getElementById('hidden_event_name'),
          document.getElementById('hidden_event_date'),
          document.getElementById('hidden_event_city')
        ];
        hiddenFields.forEach(field => {
          if (field) {
            container.appendChild(field);
            console.log('✅ Moved hidden field to container:', field.name);
          }
        });

        // Insert script using Bitrix recommended pattern with cache-busting timestamp
        const script = document.createElement('script');
        script.async = true;
        script.setAttribute('data-b24-form', 'inline/739/0zko7k');
        script.setAttribute('data-skip-moving', 'true');
        // Pass parameters as data attributes for Bitrix
        script.setAttribute('data-EVNUMBER', id);
        script.setAttribute('data-EVENT_NAME', eventName || `Мероприятие №${id}`);
        script.setAttribute('data-EVENT_DATE', eventDate || '');
        script.setAttribute('data-EVENT_CITY', eventCity || '');
        
        console.log('📋 Inserting Bitrix loader script with params:', {id, eventName, eventDate, eventCity});
        // Setup window variables before loading the script so Bitrix can read them
        window.B24_FORM_PARAMS = {
          EVNUMBER: id,
          EVENT_NAME: eventName || `Мероприятие №${id}`,
          EVENT_DATE: eventDate || '',
          EVENT_CITY: eventCity || ''
        };
        console.log('📌 Window params set:', window.B24_FORM_PARAMS);
        
        const loaderUrl = loaderBase + '?ts=' + Date.now();

        // Load via proxy src — proxy is on same domain so content blockers won't block it.
        script.src = loaderUrl;
        container.appendChild(script);
        console.log('📥 Appended Bitrix loader via proxy', loaderUrl);

        // Monitor form submission after it appears
        setTimeout(() => {
          const formEl = document.querySelector('form');
          if (formEl) {
            console.log('📝 Found form element, attaching submit listener');
            formEl.addEventListener('submit', (e) => {
              console.log('🔴 FORM SUBMIT EVENT - Form is being submitted!');
              const allInputs = formEl.querySelectorAll('[name]');
              console.log(`📋 Submitted fields (${allInputs.length}):`);
              allInputs.forEach((el) => {
                console.log(`  ${el.name}: "${String(el.value).substring(0, 100)}"`);
              });
            }, true);
          } else {
            console.log('⚠️ Form element not found yet');
          }
        }, 500);

        // Also listen for form init to pass params via setProperty and move hidden fields into form
        window.addEventListener('b24:form:init', function(ev){
          try{
            const detail = ev && ev.detail;
            console.log('🎯 b24:form:init fired, detail keys:', detail && Object.keys(detail));
            
            // detail.object is the form API object
            const form = detail && detail.object;
            console.log('📋 Form object:', !!form, 'has setProperty:', form && typeof form.setProperty === 'function');
            
            // Log form fields
            const formEl2 = document.querySelector('form');
            if (formEl2) {
              const inputs = formEl2.querySelectorAll('input, textarea, select');
              console.log(`📝 Form has ${inputs.length} input fields:`);
              inputs.forEach((el, i) => {
                console.log(`  [${i}] name="${el.name}" type="${el.type}" id="${el.id}" value="${String(el.value).substring(0, 50)}"`);
              });
              
              // Try to find field that might accept EVPASSPORT_ID
              const allAttrs = [];
              inputs.forEach(el => {
                for (let attr of el.attributes) {
                  allAttrs.push(`${attr.name}=${attr.value}`);
                }
              });
              console.log('📋 All field attributes:', allAttrs.slice(0, 10));
            }
            
            if (form && typeof form.setProperty === 'function') {
              console.log('🔧 Calling setProperty for custom fields...');
              form.setProperty('EVNUMBER', id);
              form.setProperty('EVENT_NAME', eventName || `Мероприятие №${id}`);
              form.setProperty('EVENT_DATE', eventDate || '');
              form.setProperty('EVENT_CITY', eventCity || '');
              console.log('✅ setProperty calls done, EVNUMBER=' + id);
              
              // Try other potential field names
              if (typeof form.setFieldValue === 'function') {
                console.log('🔧 Trying setFieldValue...');
                form.setFieldValue('EVNUMBER', id);
              }
            } else {
              console.warn('⚠️ Form object or setProperty not found in detail');
            }
            
            // Try direct DOM manipulation on any field that might contain our data
            const formEl3 = document.querySelector('form');
            if (formEl3) {
              // Try to fill hidden fields that Bitrix might have created
              const allInputs = formEl3.querySelectorAll('input[type="hidden"], input[type="text"]');
              console.log('🔍 Checking for potential EVNUMBER fields...');
              allInputs.forEach(input => {
                if (input.name && input.name.toLowerCase().includes('evnumber')) {
                  console.log(`  Found EVNUMBER field: ${input.name}, filling with ${id}`);
                  input.value = id;
                } else if (input.name && input.name.toLowerCase().includes('number')) {
                  console.log(`  Found number field: ${input.name}, filling with ${id}`);
                  input.value = id;
                } else if (input.name && (input.name === 'PHONE' || input.name === 'PHONE_NUMBER' || input.name === 'phone')) {
                  console.log(`  Found phone field: ${input.name}, filling with ${id}`);
                  input.value = id;
                }
              });
            }
            
            // Move hidden fields into the form element so they're submitted with it
            const hiddenFields = [
              document.getElementById('hidden_evnumber'),
              document.getElementById('hidden_event_name'),
              document.getElementById('hidden_event_date'),
              document.getElementById('hidden_event_city')
            ];
            const formElTarget = document.querySelector('form');
            if (formElTarget) {
              hiddenFields.forEach(field => {
                if (field && !(field.parentElement && field.parentElement.closest('form'))) {
                  formElTarget.appendChild(field);
                  console.log('✅ Moved hidden field to form:', field.name);
                }
              });
            }
          }catch(e){console.error('❌ b24:form:init error:', e)}
        });
      }
    })();
  </script>
</body>
</html>
