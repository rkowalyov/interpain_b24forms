<!doctype html>
<!-- Build timestamp: 2026-07-17T21:30:00Z -->
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Регистрация на мероприятие</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;color:#111}
    body{margin:0;background:#f7f7f8;padding:24px;display:flex;align-items:flex-start;justify-content:center}
    .card{max-width:720px;width:100%;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(16,24,40,.08);padding:24px}
    h1{font-size:20px;margin:0 0 12px}
    #title{font-size:44px;line-height:1.14;font-weight:700;letter-spacing:-0.02em;margin:0 auto 14px;max-width:980px;text-wrap:balance}
    .event-header{text-align:center}
    .event-meta{color:#444;margin:6px 0;text-align:center;font-size:18px;line-height:1.35}
    .error{color:#b00020;background:#fff0f1;padding:12px;border-radius:6px}
    .hint{color:#666;font-size:14px;margin-top:8px}
    #b24form_container{margin-top:18px}
    .status-panel{display:none;margin-top:14px;border:1px solid #eceff3;border-radius:10px;padding:18px;background:#fafcff}
    .status-panel__icon{width:38px;height:38px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
    .status-panel__title{font-size:20px;font-weight:700;line-height:1.25;margin:0 0 8px}
    .status-panel__text{font-size:14px;line-height:1.45;color:#4b5563;margin:0}
    .status-panel--not-found{background:#fff6f6;border-color:#ffd8d8}
    .status-panel--not-found .status-panel__icon{background:#ffe5e5;color:#8b1f1f}
    .status-panel--not-found .status-panel__title{color:#7f1d1d}
    .status-panel--closed{background:#fff9ec;border-color:#ffe3ad}
    .status-panel--closed .status-panel__icon{background:#ffecc4;color:#854d0e}
    .status-panel--closed .status-panel__title{color:#854d0e}
    .status-panel--error{background:#f4f8ff;border-color:#dbe8ff}
    .status-panel--error .status-panel__icon{background:#e5efff;color:#1e3a8a}
    .status-panel--error .status-panel__title{color:#1e3a8a}
    @media (max-width: 768px){
      body{padding:12px}
      .card{padding:16px}
      #title{font-size:30px;line-height:1.18;max-width:100%}
      .event-meta{font-size:16px;line-height:1.32}
      .hint{font-size:13px}
      #b24form_container{margin-top:14px}
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="event-header">
      <h1 id="title">Мероприятие</h1>
      <div id="info" class="event-meta"></div>
      <div id="venue-info" class="event-meta" style="display:none"></div>
      <div id="error" class="error" style="display:none"></div>
      <div id="event-status" class="status-panel" aria-live="polite">
        <div id="event-status-icon" class="status-panel__icon">!</div>
        <h2 id="event-status-title" class="status-panel__title"></h2>
        <p id="event-status-text" class="status-panel__text"></p>
      </div>
    </div>
    <div id="closing-notice" style="display:none;background:#e8f5e9;padding:12px;border-radius:6px;margin-top:12px;text-align:center;font-weight:bold;color:#2e7d32;font-size:16px"></div>
    <div id="debug-log" style="display:none;background:#f5f5f5;padding:12px;border-radius:6px;margin-top:12px;font-size:12px;max-height:200px;overflow-y:auto;border:1px solid #ddd;font-family:monospace"></div>
    <!-- Hidden form fields to pass parameters to Bitrix -->
    <input type="hidden" id="hidden_evnumber" name="EVNUMBER" value="">
    <input type="hidden" id="hidden_event_name" name="EVENT_NAME" value="">
    <input type="hidden" id="hidden_event_date" name="EVENT_DATE" value="">
    <input type="hidden" id="hidden_event_city" name="EVENT_CITY" value="">
    <div id="b24form_container"></div>
    <div class="hint">Если форма не загружается — свяжитесь с организатором.</div>
  </div>

  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const idStr = params.get('EVNUMBER');
      const id = idStr ? parseInt(idStr, 10) : null;
      const idAsNumber = id;
      const titleEl = document.getElementById('title');
      const infoEl = document.getElementById('info');
      const venueInfoEl = document.getElementById('venue-info');
      const errorEl = document.getElementById('error');
      const formContainerEl = document.getElementById('b24form_container');
      const hintEl = document.querySelector('.hint');
      const statusPanelEl = document.getElementById('event-status');
      const statusIconEl = document.getElementById('event-status-icon');
      const statusTitleEl = document.getElementById('event-status-title');
      const statusTextEl = document.getElementById('event-status-text');
      let eventName = '';
      let eventDate = '';
      let eventCity = '';
      let eventVenue = '';
      let closingStarted = false;
      
      // Global logging function
      window.debugLog = (msg) => {
        console.log(msg);
        const log = document.getElementById('debug-log');
        if (log) {
          const time = new Date().toLocaleTimeString();
          log.innerHTML += `[${time}] ${msg}<br>`;
          log.scrollTop = log.scrollHeight;
        }
      };
      
      window.showClosingCountdown = () => {
        if (closingStarted) {
          window.debugLog('⚠️ Already closing');
          return;
        }
        closingStarted = true;
        
        const closingNotice = document.getElementById('closing-notice');
        window.debugLog('✅ showClosingCountdown called!');
        
        let seconds = 3;
        const updateNotice = () => {
          closingNotice.textContent = `Окно закроется через ${seconds} сек...`;
          closingNotice.style.display = 'block';
          window.debugLog(`⏱️ ${seconds}s left`);
          
          if (seconds === 0) {
            closingNotice.textContent = '👋 Закрытие...';
            window.debugLog('👋 Calling window.close()');
            window.close();
          } else {
            seconds--;
            setTimeout(updateNotice, 1000);
          }
        };
        
        updateNotice();
      };
      
      window.debugLog('🌍 Page initialized, EVNUMBER=' + idStr);

      if (!id || isNaN(id)) {
        errorEl.textContent = 'Ошибка: параметр EVNUMBER не указан в URL или не является числом.';
        errorEl.style.display = 'block';
        titleEl.textContent = 'Регистрация на мероприятие';
        window.debugLog('❌ Invalid EVNUMBER: ' + idStr);
        return;
      }

      titleEl.textContent = `Мероприятие №${id}`;

      const API_BASE = window.EVENT_API_BASE || '/api/event';
      const apiUrl = `${API_BASE}/${encodeURIComponent(id)}`;
      let shouldLoadForm = false;

      function showFormBlockedMessage(kind, title, text) {
        titleEl.textContent = 'Регистрация на мероприятие';
        infoEl.textContent = '';
        venueInfoEl.style.display = 'none';
        venueInfoEl.textContent = '';
        errorEl.style.display = 'none';
        statusPanelEl.className = `status-panel status-panel--${kind}`;
        statusTitleEl.textContent = title;
        statusTextEl.textContent = text;
        statusIconEl.textContent = kind === 'closed' ? '!' : kind === 'error' ? '?' : 'x';
        statusPanelEl.style.display = 'block';
        formContainerEl.style.display = 'none';
        if (hintEl) hintEl.style.display = 'none';
      }

      fetch(apiUrl, {credentials:'same-origin'})
        .then(async (resp) => {
          const data = await resp.json().catch(() => ({}));
          return { ok: resp.ok, status: resp.status, data };
        })
        .then(({ ok, status, data }) => {
          if (!ok) {
            if (status === 404 || data.message === 'Мероприятие не найдено') {
              showFormBlockedMessage('not-found', 'Мероприятие не найдено', 'Проверьте ссылку или обратитесь к организатору.');
              window.debugLog('⛔ Event not found for EVNUMBER=' + id);
              return;
            }
            throw new Error('API response ' + status);
          }

          if (data && data.found === false) {
            showFormBlockedMessage('not-found', 'Мероприятие не найдено', 'Проверьте ссылку или обратитесь к организатору.');
            window.debugLog('⛔ Event not found by payload for EVNUMBER=' + id);
            return;
          }

          if (data && data.registrationOpen === false) {
            showFormBlockedMessage('closed', 'Регистрация сейчас закрыта', 'Регистрация на это мероприятие временно недоступна.');
            window.debugLog('⛔ Registration is closed for EVNUMBER=' + id + ', stateId=' + data.stateId);
            return;
          }

          eventName = data.name || data.title || '';
          eventDate = data.date || data.event_date || '';
          eventCity = data.city || data.location || '';
          eventVenue = data.venue || '';
          if (eventName && eventCity) {
            titleEl.textContent = `${eventName} (${eventCity})`;
          } else if (eventName) {
            titleEl.textContent = eventName;
          }
          const parts = [];
          if (eventDate) parts.push(`Дата: ${formatDate(eventDate)}`);
          infoEl.textContent = parts.join(' • ');
          if (eventVenue) {
            venueInfoEl.innerHTML = `Место: ${escapeHtml(eventVenue)}`;
            venueInfoEl.style.display = 'block';
          } else {
            venueInfoEl.style.display = 'none';
            venueInfoEl.textContent = '';
          }
          shouldLoadForm = true;
          window.debugLog('✅ Event data loaded');
        })
        .catch(err => {
          window.debugLog('⚠️ Event API error: ' + err.message);
          showFormBlockedMessage('error', 'Не удалось загрузить данные мероприятия', 'Попробуйте обновить страницу позже.');
        })
        .finally(() => {
          if (!shouldLoadForm) {
            return;
          }
          window.debugLog('Loading Bitrix form...');
          document.getElementById('hidden_evnumber').value = id;
          document.getElementById('hidden_event_name').value = eventName || `Мероприятие №${id}`;
          document.getElementById('hidden_event_date').value = eventDate || '';
          document.getElementById('hidden_event_city').value = eventCity || '';
          loadB24();
        });

      function formatDate(d){
        try{const dt=new Date(d); if (isNaN(dt)) return d; return dt.toLocaleString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});}catch(e){return d}
      }

      function escapeHtml(s){
        const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
        return String(s).replace(/[&<>"']/g, c => map[c]);
      }

      // Track if this is final form submission
      // (already declared at top of function)

      // Intercept fetch requests to add our parameters
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0];
        const options = args[1] || {};
        
        // Log all POST requests for debugging
        if (typeof url === 'string' && options.method === 'POST') {
          window.debugLog('📤 POST to: ' + url.substring(0, 60));
        }
        
        // If this looks like a Bitrix form submission (POST to bitrix24.ru)
        if (typeof url === 'string' && url.includes('bitrix24.ru') && options.method === 'POST') {
          window.debugLog('🎯 Bitrix POST detected');
          
          // Try adding params to URL as query params
          let modifiedUrl = url;
          if (!modifiedUrl.includes('EVNUMBER')) {
            const separator = modifiedUrl.includes('?') ? '&' : '?';
            modifiedUrl = modifiedUrl + separator + 'EVNUMBER=' + id;
            args[0] = modifiedUrl;
            window.debugLog('🔗 Added EVNUMBER to URL');
          }
          
          // Try to add parameters to the request body
          if (options.body && options.body instanceof FormData) {
            options.body.append('EVNUMBER', String(id));
            options.body.append('EVENT_NAME', eventName || `Мероприятие №${id}`);
            options.body.append('EVENT_DATE', eventDate || '');
            options.body.append('EVENT_CITY', eventCity || '');
            window.debugLog('✅ Added params to FormData');
          }
        }
        
        // Chain the fetch to detect successful completion
        const fetchPromise = originalFetch.apply(this, args);
        
        // Monitor all responses for debugging
        if (typeof url === 'string' && url.includes('bitrix24.ru')) {
          fetchPromise
            .then(response => {
              window.debugLog(`✅ Bitrix response: ${response.status}`);
              // Close window on successful response
              window.debugLog('💚 Triggering close sequence');
              window.showClosingCountdown();
              return response;
            })
            .catch(err => {
              window.debugLog('❌ Fetch error: ' + err.message);
            });
        }
        
        return fetchPromise;
      };

      // Also intercept XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        this._url = url;
        this._method = method;
        if (method === 'POST') {
          window.debugLog('📤 XHR POST to: ' + url.substring(0, 60));
        }
        return originalOpen.apply(this, [method, url, ...rest]);
      };

      const originalSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function(body) {
        if (this._url && this._url.includes('bitrix24.ru') && this._method === 'POST' && body) {
          window.debugLog('🎯 Bitrix XHR detected');
          try {
            if (body instanceof FormData) {
              body.append('EVNUMBER', id);
              body.append('EVENT_NAME', eventName || `Мероприятие №${id}`);
              body.append('EVENT_DATE', eventDate || '');
              body.append('EVENT_CITY', eventCity || '');
              window.debugLog('✅ Added params to XHR FormData');
            }
          } catch (e) {
            window.debugLog('❌ XHR error: ' + e.message);
          }

          // Listen for XHR completion
          const originalOnReadyStateChange = this.onreadystatechange;
          this.onreadystatechange = function() {
            if (this.readyState === 4) {
              window.debugLog(`✅ XHR completed: ${this.status}`);
              if (this.status >= 200 && this.status < 400) {
                window.debugLog('💚 Triggering close sequence from XHR');
                window.showClosingCountdown();
              }
            }
            if (originalOnReadyStateChange) {
              originalOnReadyStateChange.apply(this, arguments);
            }
          };
        }
        return originalSend.apply(this, [body]);
      };

      function loadB24(){
        window.debugLog('🚀 loadB24 started');
        const loaderBase = window.B24_LOADER_URL || '/api/loader';
        const container = document.getElementById('b24form_container');

        try {
          container.textContent = '';
        } catch (e) {
          try { container.innerHTML = ''; } catch (e) {}
        }

        const script = document.createElement('script');
        script.async = true;
        script.setAttribute('data-b24-form', 'inline/739/0zko7k');
        script.setAttribute('data-skip-moving', 'true');
        script.setAttribute('data-EVNUMBER', id);
        
        window.B24_FORM_PARAMS = {
          EVNUMBER: id,
          EVENT_NAME: eventName || `Мероприятие №${id}`,
          EVENT_DATE: eventDate || '',
          EVENT_CITY: eventCity || ''
        };
        
        const loaderUrl = loaderBase + '?ts=' + Date.now();
        script.src = loaderUrl;
        container.appendChild(script);
        window.debugLog('📥 Bitrix loader appended');

        // Monitor form submission after it appears
        setTimeout(() => {
          const formEl = document.querySelector('form');
          if (formEl) {
            window.debugLog('📝 Form found');
            formEl.addEventListener('submit', (e) => {
              window.debugLog('🔴 Form submitted');
            }, true);
          }
        }, 500);

        // Also listen for form init to pass params via setProperty
        window.addEventListener('b24:form:init', function(ev){
          try{
            const form = ev?.detail?.object;
            if (form && typeof form.setProperty === 'function') {
              window.debugLog('🔧 Setting form properties');
              form.setProperty('EVNUMBER', id);
              form.setProperty('EVENT_NAME', eventName || `Мероприятие №${id}`);
              form.setProperty('EVENT_DATE', eventDate || '');
              form.setProperty('EVENT_CITY', eventCity || '');
              window.debugLog('✅ Form properties set');
            }
          }catch(e){window.debugLog('❌ b24:form:init error: ' + e.message);}
        });
      }
    })();
  </script>
</body>
</html>
